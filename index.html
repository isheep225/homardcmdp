<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Souper Homard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
    }
    #wrapper {
      position: relative;
      width: min(100vw, 150dvh);
      height: min(100dvh, 66.67vw);
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    #win-screen {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Georgia, serif;
      text-align: center;
      padding: 5%;
    }
    #win-screen.show { display: flex; }
    #win-screen h1 { font-size: clamp(1.4em, 5vw, 2.8em); color: #ff9944; margin-bottom: 0.5em; }
    #win-screen p  { font-size: clamp(0.9em, 2.5vw, 1.3em); margin-bottom: 1.5em; }
    #win-screen a  {
      display: inline-block;
      background: #e63; color: #fff;
      padding: 0.7em 1.6em; border-radius: 8px;
      font-size: clamp(1em, 3vw, 1.5em);
      text-decoration: none; font-weight: bold;
      box-shadow: 0 4px 20px #e6336688;
      transition: transform .15s;
    }
    #win-screen a:hover { transform: scale(1.05); }
    /* Portrait lock overlay */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0600;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Georgia, serif;
      text-align: center;
      padding: 10%;
      gap: 1.5em;
    }
    #rotate-overlay .rotate-icon {
      font-size: clamp(3em, 18vw, 6em);
      animation: spin-hint 2.5s ease-in-out infinite;
    }
    #rotate-overlay p { font-size: clamp(1em, 5vw, 1.5em); color: #ff9944; }
    @keyframes spin-hint {
      0%, 40%  { transform: rotate(0deg);   }
      60%, 100%{ transform: rotate(90deg);  }
    }
    @media (pointer: coarse) and (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }
    /* Mobile action button overlay */
    #fire-btn {
      display: none;
      position: absolute;
      right: 4%;
      bottom: 18%;
      width: clamp(60px, 12vw, 90px);
      height: clamp(60px, 12vw, 90px);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ff8844, #cc3300);
      border: 3px solid #fff6;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.6em, 4vw, 2.4em);
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 18px #0008;
    }
  </style>
</head>
<body>
<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <p>Tourne ton écran en mode paysage pour jouer</p>
</div>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="win-screen">
    <h1>🦞 Bravo, Chef !</h1>
    <p>Tu as cuit 5 homards à la perfection.<br>Tu mérites ta place au souper !</p>
    <a href="https://forms.gle/zsqDGzBpZuJVxEpA9" target="_blank">
      S'inscrire au Souper Homard →
    </a>
  </div>
  <div id="fire-btn" role="button" aria-label="Lancer">🦞</div>
</div>
<script src="game.js"></script>
</body>
</html>
